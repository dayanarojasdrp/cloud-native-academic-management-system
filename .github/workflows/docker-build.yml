name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build:
    name: Build backend and frontend images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DevOps repository
        uses: actions/checkout@v4
        with:
          path: cloud-native-academic-management-system

      - name: Checkout backend repository
        uses: actions/checkout@v4
        with:
          repository: dayanarojasdrp/academic-management-api
          path: academic-management-api

      - name: Checkout frontend repository
        uses: actions/checkout@v4
        with:
          repository: Sunaymg04/academic-management-web
          path: academic-management-web

      - name: Build backend image
        run: |
          docker build \
            -f cloud-native-academic-management-system/docker/backend.Dockerfile \
            -t academic-management-api:ci \
            academic-management-api

      - name: Build frontend image
        run: |
          docker build \
            -f cloud-native-academic-management-system/docker/frontend.Dockerfile \
            -t academic-management-web:ci \
            .

