name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-ci:
    name: Vue quality checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v4
        with:
          repository: Sunaymg04/academic-management-web
          path: frontend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint if available
        run: |
          if npm run | grep -q " lint"; then
            npm run lint
          else
            echo "No lint script found; skipping lint."
          fi

      - name: Build frontend
        run: npm run build
