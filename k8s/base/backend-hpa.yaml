apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: academic-backend
  namespace: academic-management
  labels:
    app.kubernetes.io/name: academic-management-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: academic-management
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: academic-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
