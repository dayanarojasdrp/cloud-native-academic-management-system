apiVersion: apps/v1
kind: Deployment
metadata:
  name: academic-backend
  namespace: academic-management
  labels:
    app.kubernetes.io/name: academic-management-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: academic-management
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: academic-management-api
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: academic-management-api
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: academic-management
    spec:
      containers:
        - name: backend
          image: ghcr.io/dayanarojasdrp/academic-management-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: academic-backend-config
            - secretRef:
                name: academic-backend-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
