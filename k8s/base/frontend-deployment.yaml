apiVersion: apps/v1
kind: Deployment
metadata:
  name: academic-frontend
  namespace: academic-management
  labels:
    app.kubernetes.io/name: academic-management-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: academic-management
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: academic-management-web
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: academic-management-web
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: academic-management
    spec:
      containers:
        - name: frontend
          image: ghcr.io/sunaymg04/academic-management-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: academic-frontend-nginx
