apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-exporter-config
  namespace: academic-observability
  labels:
    app.kubernetes.io/name: blackbox-exporter
    app.kubernetes.io/part-of: academic-management
data:
  blackbox.yml: |
    modules:
      http_2xx:
        prober: http
        timeout: 5s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: []
          method: GET
          preferred_ip_protocol: ip4
