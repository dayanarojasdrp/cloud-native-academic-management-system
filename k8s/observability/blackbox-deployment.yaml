apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: academic-observability
  labels:
    app.kubernetes.io/name: blackbox-exporter
    app.kubernetes.io/component: probe
    app.kubernetes.io/part-of: academic-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blackbox-exporter
      app.kubernetes.io/component: probe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blackbox-exporter
        app.kubernetes.io/component: probe
        app.kubernetes.io/part-of: academic-management
    spec:
      containers:
        - name: blackbox-exporter
          image: prom/blackbox-exporter:v0.25.0
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/blackbox_exporter/blackbox.yml
          ports:
            - name: http
              containerPort: 9115
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: blackbox-config
              mountPath: /etc/blackbox_exporter/blackbox.yml
              subPath: blackbox.yml
      volumes:
        - name: blackbox-config
          configMap:
            name: blackbox-exporter-config
