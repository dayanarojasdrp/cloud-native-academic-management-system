apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: academic-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: academic-management
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.academic-observability.svc.cluster.local:9090
        isDefault: true

  dashboard-provider.yml: |
    apiVersion: 1
    providers:
      - name: academic-management
        orgId: 1
        folder: Academic Management
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards

  api-dashboard.json: |
    {
      "uid": "academic-api-health",
      "title": "Academic API Health",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": ["academic-management", "api", "health"],
      "panels": [
        {
          "type": "stat",
          "title": "Backend Health Target",
          "gridPos": {"x": 0, "y": 0, "w": 8, "h": 5},
          "targets": [
            {
              "expr": "probe_success{job=\"academic-backend-health\"}",
              "legendFormat": "Laravel API"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Backend Health Over Time",
          "gridPos": {"x": 8, "y": 0, "w": 16, "h": 5},
          "targets": [
            {
              "expr": "probe_success{job=\"academic-backend-health\"}",
              "legendFormat": "health probe"
            }
          ]
        }
      ]
    }
