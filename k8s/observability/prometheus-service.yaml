apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: academic-observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: metrics
    app.kubernetes.io/part-of: academic-management
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: metrics
  ports:
    - name: http
      port: 9090
      targetPort: http
